<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Акерке Оразхан</title>
</head>
<body class="bg-gray-100 p-4 md:p-6 font-sans">
    <div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-lg overflow-hidden">
        <!-- Шапка с именем -->
        <div class="bg-indigo-600 text-white px-6 py-5">
            <h1 class="text-2xl font-bold">Акерке Оразхан</h1>
            <p class="text-indigo-200 text-sm mt-1">Расписание на завтра 08.04.</p>
        </div>

        <!-- 8 уроков по горизонтали -->
        <div class="p-5 overflow-x-auto">
            <div class="flex gap-3 min-w-max">
                <div class="bg-indigo-50 rounded-xl px-5 py-3 text-center border border-indigo-100 min-w-[70px]">
                    <div class="text-xs text-gray-500">1.</div>
                    <div class="font-semibold text-gray-800">КМЗ</div>
                </div>
                <div class="bg-indigo-50 rounded-xl px-5 py-3 text-center border border-indigo-100 min-w-[70px]">
                    <div class="text-xs text-gray-500">2.</div>
                    <div class="font-semibold text-gray-800">КМЗ</div>
                </div>
                <div class="bg-indigo-50 rounded-xl px-5 py-3 text-center border border-indigo-100 min-w-[70px]">
                    <div class="text-xs text-gray-500">3.</div>
                    <div class="font-semibold text-gray-800">КМ</div>
                </div>
                <div class="bg-indigo-50 rounded-xl px-5 py-3 text-center border border-indigo-100 min-w-[70px]">
                    <div class="text-xs text-gray-500">4.</div>
                    <div class="font-semibold text-gray-800">КМ</div>
                </div>
                <div class="bg-indigo-50 rounded-xl px-5 py-3 text-center border border-indigo-100 min-w-[70px]">
                    <div class="text-xs text-gray-500">5.</div>
                    <div class="font-semibold text-gray-800">ЖММ</div>
                </div>
                <div class="bg-indigo-50 rounded-xl px-5 py-3 text-center border border-indigo-100 min-w-[70px]">
                    <div class="text-xs text-gray-500">6.</div>
                    <div class="font-semibold text-gray-800">ЖММ</div>
                </div>
                <div class="bg-indigo-50 rounded-xl px-5 py-3 text-center border border-indigo-100 min-w-[70px]">
                    <div class="text-xs text-gray-500">7.</div>
                    <div class="font-semibold text-gray-800">КМЗ</div>
                </div>
                <div class="bg-indigo-50 rounded-xl px-5 py-3 text-center border border-indigo-100 min-w-[70px]">
                    <div class="text-xs text-gray-500">8.</div>
                    <div class="font-semibold text-gray-800">КМЗ</div>
                </div>
            </div>
        </div>

        <!-- Сообщения (список) -->
        <div class="border-t border-gray-200">
            <div class="px-6 py-3 bg-gray-50">
                <h2 class="text-gray-700 font-semibold flex items-center gap-2">
                    <i class="far fa-comment-dots text-indigo-500"></i> Сообщения
                </h2>
            </div>
            <div class="divide-y divide-gray-100">
                <div class="px-6 py-3 flex items-center gap-3"><i class="far fa-calendar-alt text-gray-400 w-5"></i><span class="text-gray-700">Расписание уроков</span></div>
                <div class="px-6 py-3 flex items-center gap-3"><i class="fas fa-book-open text-gray-400 w-5"></i><span class="text-gray-700">Мои курсы</span></div>
                <div class="px-6 py-3 flex items-center gap-3"><i class="fas fa-star text-gray-400 w-5"></i><span class="text-gray-700">Оценки</span></div>
                <div class="px-6 py-3 flex items-center gap-3"><i class="fas fa-tasks text-gray-400 w-5"></i><span class="text-gray-700">Работы / экзамены</span></div>
                <div class="px-6 py-3 flex items-center gap-3"><i class="fas fa-layer-group text-gray-400 w-5"></i><span class="text-gray-700">Учебный план</span></div>
                <div class="px-6 py-3 flex items-center gap-3"><i class="fas fa-chart-line text-gray-400 w-5"></i><span class="text-gray-700">Результаты</span></div>
                <div class="px-6 py-3 flex items-center gap-3"><i class="fas fa-user-check text-gray-400 w-5"></i><span class="text-gray-700">Посещаемость</span></div>
                <div class="px-6 py-3 flex items-center gap-3"><i class="fas fa-credit-card text-gray-400 w-5"></i><span class="text-gray-700">Платежи</span></div>
                <div class="px-6 py-3 flex items-center gap-3"><i class="fas fa-exchange-alt text-gray-400 w-5"></i><span class="text-gray-700">Замены</span></div>
                <div class="px-6 py-3 flex items-center gap-3"><i class="fas fa-utensils text-gray-400 w-5"></i><span class="text-gray-700">Меню столовой</span></div>
                <div class="px-6 py-3 flex items-center gap-3"><i class="fas fa-chalkboard text-gray-400 w-5"></i><span class="text-gray-700">Фотографии / Доска объявлений</span></div>
                <div class="px-6 py-3 flex items-center gap-3"><i class="fas fa-poll text-gray-400 w-5"></i><span class="text-gray-700">Регистрация / Опросы</span></div>
                <div class="px-6 py-3 flex items-center gap-3"><i class="fab fa-telegram-plane text-gray-400 w-5"></i><span class="text-gray-700">Chat</span></div>
            </div>
        </div>
    </div>

    <!-- Font Awesome иконки -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</body>
</html>
